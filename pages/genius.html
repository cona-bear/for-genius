<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>You are a Genius!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fff9c4 0%, #ffeb3b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .card {
            padding: 60px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 5px solid #ffd700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }
        h1 {
            color: #fbc02d;
            font-size: 3.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.8rem;
            color: #455a64;
            font-weight: bold;
        }
        .medal {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
        }
        .info {
            font-size: 1rem;
            color: #9e9e9e;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card" onclick="goToRandomGame()">
        <span class="medal">👑</span>
        <h1>Congrats!</h1>
        <p>You are <span style="color: #fbc02d;">GENIUS!</span></p>
        <div style="font-size: 2rem; margin-top: 15px;">🚀🧠✨</div>
        <p class="info">Click to challenge a random game!</p>
    </div>

    <script>
        function goToRandomGame() {
            const seed = Date.now();
            
            const urls = [
                "https://www.nytimes.com/games/wordle",
                "https://kordle.kr",
                "https://www.merriam-webster.com/games/quordle",
                "https://globle.org/",
                `https://numberle.org/?seed=${seed}`,
                "https://wafflegame.net/"
            ];

            const randomUrl = urls[Math.floor(Math.random() * urls.length)];
            location.href = randomUrl;
        }
    </script>

</body>
</html>
