<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Congrats!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        .container {
            padding: 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        h1 {
            color: #ff4757;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.5rem;
            color: #2f3542;
        }
        .emoji {
            font-size: 4rem;
        }
    </style>
</head>
<body>

    <div class="container" onclick="goToRandomGame()">
        <div class="emoji">🤪</div>
        <h1>Congrats!</h1>
        <p>You are <strong>babo</strong>!</p>
        <p style="font-size: 0.9rem; color: #a1a1a1;">(Click me to play a random game!)</p>
    </div>

    <script>
        function goToRandomGame() {
            const seed = Math.floor(Math.random() * 10000);
            
            const urls = [
                "https://www.nytimes.com/games/wordle",
                "https://kordle.kr",
                "https://www.merriam-webster.com/games/quordle",
                "https://globle.org/",
                `https://numberle.org/?seed=${seed}`,
                "https://wafflegame.net/"
            ];

            const randomUrl = urls[Math.floor(Math.random() * urls.length)];
            
            location.href = randomUrl;
        }
    </script>

</body>
</html>
